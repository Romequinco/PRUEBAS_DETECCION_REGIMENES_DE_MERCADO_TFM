# ===========================================================================
# FALSE POSITIVE WINDOWS — trampas: periodos de aspecto estresado que NO son crisis del
# catalogo (deben puntuar NEGATIVO). Sirven para medir la disciplina del detector en Fase D.
# ===========================================================================
false_positive_windows:
  taper_2013:                   # LA trampa canonica de la Pista B
    ventana: ['2013-05-01', '2013-09-13']
    en_catalogo: false
    drawdown_sp500: -0.058      # por debajo de cualquier umbral equity => no es crisis
    hito: 'testimonio Bernanke 2013-05-22'
    firma: >
      shock de tipos REALES puro: DFII10 +144bp, breakeven T10YIE -20bp (¡cae!), 10Y +132bp
      (1.66->2.98), MOVE x2.4 (49->118); bear steepening T10Y2Y 1.46->2.52. Credito Baa-Aaa
      PLANO (rango 0.27pp, media anual 0.87 < media historica 1.16), BAA10Y incluso cae; VIX
      supera 20 solo 3 de 252 dias. OFR FSI_US negativo todo el año (min -1.68, max -0.46).
    trampa: >
      Un detector de VELOCIDAD de tipos (DFII10_change_z=3.83, MOVE_change_z=3.34, DGS10 z=3.11)
      dispara aqui aunque NO hay crisis de mercado. Debe puntuar NEGATIVO. Un detector de
      credito+equity/VIX estilo Capa 1 esta estructuralmente ciego (z~0): correcto que no dispare.
  debtceiling_2013:             # coletazo de octubre 2013
    ventana: ['2013-09-26', '2013-10-16']
    en_catalogo: false
    drawdown_sp500: -0.041
    firma: >
      estres localizado en T-bills por el techo de deuda: DTB3 0.00% (2013-09-26) -> 0.14%
      (2013-10-15); credito corporativo Baa-Aaa impasible (~0.00pp), Delta10Y -0.27. Micro-evento
      de funding/soberano tecnico, resuelto 2013-10-16.
    trampa: >
      Una feature de bills/funding puede disparar; no es regimen de crisis corporativa/equity.
  selloff_2018:                 # PETICION EXPLICITA — trampa INVERSA (falso negativo), ver nota
    en_catalogo: true
    naturaleza: trampa_de_falso_negativo
    sub_eventos:
      volmageddon_2018q1:    ['2018-01-26', '2018-02-08']   # depth -0.102, tipo vol_spike, 13 dias
      fed_tightening_2018q4: ['2018-09-20', '2018-12-24']   # depth -0.198, tipo correction
    firma: >
      OFR FSI CIEGO a estos eventos: volmageddon FSImax=-1.74 (por DEBAJO de la media),
      fed_tightening FSImax=0.47 (apenas roza la media). Vol-spike de equity puro y brevisimo que
      un indice de estres multi-mercado (33 vars) ni registra.
    nota_coherencia: >
      OJO: NO son falsos positivos — SI estan en crisis_catalog (aparecen tambien en crisis_windows
      de ambas pistas) y deben puntuar POSITIVO. Se listan aqui, como pidio la Fase D, porque son la
      trampa OPUESTA a taper_2013: un detector de Pista B basado en credito/FSI los trata como CALMA
      (falso NEGATIVO); solo la vol de equity (VIX / vol realizada de Pista A) los captura. Son la
      prueba discriminante que separa un sensor de vol de un indice de estres de credito/liquidez.
  otras_trampas_no_caracterizadas: >
    candidatas no medidas en esta ola de EDA (dejar como trabajo de Fase D si se necesitan mas
    negativos duros): bond massacre 1994 (shock de tipos sin crisis equity; solo relevante para la
    ventana larga de Pista A), bund tantrum abril-2015 (solapa parcialmente con china_oil_2015_16 del
    catalogo) y repo spike sep-2019 (estres de funding sin drawdown). No se congelan aqui por falta
    de numeros verificados en los reports.

