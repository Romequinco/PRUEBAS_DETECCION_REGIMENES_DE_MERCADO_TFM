# ===========================================================================
# NOTAS — que ve cada pista fuera de muestra (OOS) y por que estas ventanas.
# ===========================================================================
notas:
  cobertura_crisis:
    pista_A: >
      Ve las 22/22 crisis (1929 -> 2025), 10 de ellas recesiones NBER. Es la unica pista con
      potencia estadistica secular: 4659 dias-crisis desde 1928 solo con SP500_vol_z. Permite una
      validacion OOS con muchos eventos (p.ej. entrenar pre-1990 y testear post-1990, o k-fold por
      evento). Punto debil: la vol realizada solo 've' los crashes/pánicos (z +2.5/+2.7) y es
      NEGATIVA en los bear lentos (1957 -0.63, 1966 -0.46, 1969 -0.52); por eso el spine A lleva
      SP500_momentum, que si marca el bear lento de forma persistente.
    pista_B: >
      Ve 10/22 crisis (GFC 2007 -> tariff 2025), todas en la era del panel rico. NO ve dotcom
      (pico 2000-03-24, anterior al inicio 2003-01-02) ni nada pre-2000. A cambio discrimina mejor
      por evento (VIX/MOVE/credito AUC 0.75-0.81). Su aportacion unica es el punto ciego 2013: no
      como crisis (no lo es) sino como falso positivo que solo la VELOCIDAD de tipos distingue del
      ruido. OOS: pocos eventos => validar por evento (leave-one-crisis-out), no por i.i.d.
  por_que_estas_ventanas:
    - >
      Ventanas fijadas por DISPONIBILIDAD de datos, no por resultados (causal): A empieza en
      1927-12-30 porque es la primera fecha de SP500 (^GSPC) y termina en 2026-05-29 por el lag de
      publicacion de Fama-French; B empieza en 2003-01-02 porque es cuando arrancan los breakevens
      TIPS (DFII10/T10YIE) y termina en 2026-07-10 por el ragged-edge de MOVE.
    - >
      NO se usa la interseccion 'ingenua' de cada pista: la de A diaria colapsa a 1991-2016 (gobiernan
      BCOM y EURODOLLAR_TBILL_SPREAD, descontinuada) y la de B diaria es CONJUNTO VACIO (IORB arranca
      2021-07-29, despues de que EURODOLLAR muera 2016-10-07). La ventana se define por BLOQUE de
      features, no por interseccion total (cobertura_calidad §0, §8.1).
    - >
      El fin de A (2026-05-29) lo impone incluir los factores FF (spine diario 1926). Si Fase D
      prescinde de FF y deriva el retorno de mercado de SP500, el panel A se extiende a 2026-07-17;
      se documenta pero no es el defecto congelado.
  reglas_de_uso_fase_D:
    - "crisis_windows y drawdown_troughs son LABELS de evaluacion; jamas entran como feature (fuga)."
    - "false_positive_windows se puntuan como NEGATIVO salvo selloff_2018 (es crisis de catalogo: POSITIVO)."
    - "Toda feature se construye causal (expanding/rolling <= t); prohibido cualquier estadistico full-sample."
    - "Panel sobre calendario NYSE; series FRED alineadas por ffill/merge_asof causal (<= t), sin imputar."
    - "Estas ventanas/series/labels son la VARIABLE CONTROLADA: un experimento de Fase D no las altera."
  validacion_externa_disponible:
    - "OFR FSI (2000+) puede juzgar 11/22 crisis; ciego a volmageddon (FSImax=-1.74) — usar laxo, no como label."
    - "NBER (USRECD) etiqueta 10/22 pero LLEGA TARDE (solape <30% en recesion_1957_58, dotcom, bear_1969_70)."
    - "Usar OFR/NBER como validacion laxa complementaria; el label primario es crisis_catalog (drawdown)."
