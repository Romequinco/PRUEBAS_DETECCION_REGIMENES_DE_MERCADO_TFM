# ===========================================================================
# NOTAS — que ve cada pista fuera de muestra (OOS) y por que estas ventanas.
# ===========================================================================
notas:
  cobertura_crisis:
    pista_A: >
      ADR-002: ve 18/22 crisis (1966 -> 2025), 8 de ellas recesiones NBER — pierde las 4 con pico
      anterior a 1962-01-02 (great_crash_1929, recesion_1937_38, recesion_1957_58, kennedy_slide_1962;
      la de 1929 es la mas severa del catalogo, -86.2%). A cambio gana la curva de tipos completa
      (DGS5/DGS10/T10YFF) como bloque nuevo, inexistente en v1. Sigue siendo la pista con mas potencia
      estadistica secular de las dos (18 vs 10 eventos) y con la unica espina de valoracion/macro
      profunda (CAPE, GW predictors, 1871+). Punto debil: la vol realizada solo 've' los crashes/pánicos
      (z +2.5/+2.7) y es NEGATIVA en los bear lentos (1966 -0.46, 1969 -0.52); por eso el spine A lleva
      SP500_momentum, que si marca el bear lento de forma persistente.
    pista_B: >
      ADR-002: ve 10/22 crisis (GFC 2007 -> tariff 2025) — identicas a las que ya veian los escalones
      2003 y 2002 (mover el inicio a 2007-04-11 no cuesta ninguna crisis). NO ve dotcom (pico
      2000-03-24, anterior al inicio) ni nada pre-2000. A cambio discrimina mejor por evento
      (VIX/MOVE/credito AUC 0.75-0.81) y ahora incluye credito HY (HYG), vol-of-vol (VVIX) y breadth
      de 11 indices ademas de la espina de A. Su aportacion unica sigue siendo el punto ciego 2013:
      no como crisis (no lo es) sino como falso positivo que solo la VELOCIDAD de tipos distingue del
      ruido. OOS: pocos eventos => validar por evento (leave-one-crisis-out), no por i.i.d.
  por_que_estas_ventanas:
    - >
      ADR-002 (2026-07-20): ventanas fijadas por DISPONIBILIDAD de datos, no por resultados (causal).
      A empieza en 1962-01-02 porque es cuando arranca la curva de tipos completa (DGS5/DGS10/T10YFF);
      B empieza en 2007-04-11 porque es cuando arranca HYG_CREDIT (credito HY), sin perder ninguna
      crisis frente a arrancar en 2003 o 2002. AMBAS terminan en 2026-05-29 — a proposito la MISMA
      fecha, gobernada por FF_FACTORS_3_DAILY (spine Fama-French, incluido en las dos pistas) — para
      que A y B sean directamente comparables en el tiempo, no solo en crisis vistas.
    - >
      NO se usa la interseccion 'ingenua' de cada pista: la de A diaria colapsa a 1991-2016 (gobiernan
      BCOM y EURODOLLAR_TBILL_SPREAD, descontinuada) y la de B diaria es CONJUNTO VACIO (IORB arranca
      2021-07-29, despues de que EURODOLLAR muera 2016-10-07). La ventana se define por BLOQUE de
      features, no por interseccion total (cobertura_calidad §0, §8.1).
    - >
      El fin de A y B (2026-05-29) lo impone incluir los factores FF (spine diario 1926) EN LAS DOS
      pistas — decision deliberada de ADR-002: si se prescindiera de FF en B, el panel se extenderia
      a 2026-07-10 (via MOVE), pero se sacrifica ese margen de 6 semanas a cambio de un fin comun
      verificable entre A y B. Si Fase D decide mas adelante prescindir de FF en ambas pistas y derivar
      el retorno de mercado de SP500, el panel se extenderia a 2026-07-17; se documenta pero no es el
      defecto congelado.
    - >
      Antes de esta ADR el FIN de ventana se habia calculado erroneamente dejando que una serie
      MENSUAL (con lag de publicacion academico) lo gobernara — inconsistente con la regla ya vigente
      de que las mensuales se tratan con ffill+lag y NUNCA truncan el fin (ver notebooks/02_diseno_preprocesado.ipynb
      §3.1). Corregido: el fin SIEMPRE lo gobierna la serie DIARIA mas fresca del panel.
  reglas_de_uso_fase_D:
    - "crisis_windows y drawdown_troughs son LABELS de evaluacion; jamas entran como feature (fuga)."
    - "false_positive_windows se puntuan como NEGATIVO salvo selloff_2018 (es crisis de catalogo: POSITIVO)."
    - "Toda feature se construye causal (expanding/rolling <= t); prohibido cualquier estadistico full-sample."
    - "Panel sobre calendario NYSE; series FRED alineadas por ffill/merge_asof causal (<= t), sin imputar."
    - "Estas ventanas/series/labels son la VARIABLE CONTROLADA: un experimento de Fase D no las altera."
  validacion_externa_disponible:
    - "OFR FSI (2000+) puede juzgar 11/22 crisis; ciego a volmageddon (FSImax=-1.74) — usar laxo, no como label."
    - "NBER (USRECD) etiqueta 10/22 pero LLEGA TARDE (solape <30% en recesion_1957_58, dotcom, bear_1969_70)."
    - "Usar OFR/NBER como validacion laxa complementaria; el label primario es crisis_catalog (drawdown)."
