# benchmark_spec.yaml — BANCO DE PRUEBAS CONGELADO (variable controlada de la FASE D)
#
# Congela, POR PISTA, la ventana temporal, las series-feature de entrada, las etiquetas de
# crisis (crisis_catalog) que caen dentro de cada ventana, las trampas de falso positivo y
# los suelos de drawdown. A partir de aqui NINGUN detector puede cambiar estas ventanas ni
# estas etiquetas: son la variable controlada que hace comparables los experimentos de Fase D.
#
# Derivado del EDA profundo (Fase 3): informe completo en docs/EDA_v2.md (ventanas por bloque
# de features, salto de potencia 22 vs 10 crisis, ranking causal de features, punto ciego 2013
# = falso positivo, corr accion-bono cambia de signo ~2000). Recomputo en notebooks/01_eda.ipynb.
#
# Coherente con data/raw/<fuente>/<nombre>.parquet (status OK/CACHE en coverage_report.csv,
# fechas verificadas leyendo los parquet 2026-07-18) y con data/catalog.yaml (crisis_catalog).

meta:
  version: 1
  estado: congelado_fase3
  generado: '2026-07-18'
  proposito: >
    Fijar el banco de pruebas de las DOS pistas (ADR-001) como variable controlada de la Fase D
    (benchmark de detectores de regimen). Todo experimento de Fase D usa exactamente estas
    ventanas, estas series y estas etiquetas; lo unico que varia entre experimentos es el detector.
  criterio: >
    (1) CAUSALIDAD DE VENTANA: cada ventana_inicio/ventana_fin se fija SOLO por disponibilidad de
    datos (fecha real de arranque de la serie que gobierna el inicio; ragged-edge de la que gobierna
    el fin), NUNCA por el resultado de las crisis — no se mira el futuro para elegir los cortes.
    (2) CAUSALIDAD DE FEATURE: toda transformacion es causal (z-score expanding/rolling con
    estadisticos <= t; primitivas de src/features.py); prohibida cualquier media/std de muestra
    completa (fue el error de la tarea previa). Verificado en candidatas_features:
    max|full - truncado| = 0.0 exacto.
    (3) LABELS != FEATURES: crisis_catalog (peak->trough del S&P500) se usa SOLO como etiqueta de
    evaluacion, jamas como feature. Es fiel al dato: recalculo del drawdown sobre ^GSPC cuadra con
    catalog.yaml con error maximo 0.048 pp (crisis_espina_profunda).
  regla_de_oro: "toda feature causal; NUNCA estadisticos de muestra completa"
  politica_datos: "sin-imputar; huecos = fechas ausentes del indice, no NaN (cobertura_calidad)"
  calendario_panel: "NYSE como rejilla base; series FRED alineadas por merge_asof / ffill causal (<= t)"
  n_crisis_catalogo: 22
  carga_series: "pd.read_parquet('data/raw/{fuente}/{nombre}.parquet')[nombre]"

# ===========================================================================
# PISTA A — espina historica profunda. Objetivo: POTENCIA (maximo nº de crisis).
# ===========================================================================
pista_A:
  descripcion: "S&P500 + vol realizada + factores + credito/macro profundos; pocas features, maxima historia"
  objetivo: potencia
  ventana_inicio: '1927-12-30'   # gobierna SP500 (^GSPC) — primera fecha real del precio diario
  ventana_fin: '2026-05-29'      # gobierna FF_FACTORS_3_DAILY / FF_MOM_DAILY (lag academico)
  gobierna_inicio: SP500
  gobierna_fin: FF_FACTORS_3_DAILY
  granularidad: "diaria (spines de credito/macro mensuales, alineados por ffill causal)"
  n_crisis_en_ventana: 22        # las 22 del catalogo (todos los picos >= 1927-12-30)
  series_features:
    # -- espina diaria de equity/vol (la que da las 22 crisis) --
    - SP500                 # ^GSPC 1927-12-30->2026-07-17; base de ret, drawdown, momentum
    - REALIZED_VOL_SP500    # 1927-12-30->2026-07-17; workhorse causal (AUC 0.739, unica con 22 crisis)
    - FF_FACTORS_3_DAILY    # 1926-07-01->2026-05-29; Mkt-RF/SMB/HML, TR diario mas limpio que ^GSPC
    - FF_MOM_DAILY          # 1926-11-03->2026-05-29; momentum crashes (giros de regimen)
    # -- credito profundo mensual (spread Baa-Aaa, 1919; ffill causal) --
    - MOODYS_BAA            # 1919-01-01->2026-06-01
    - MOODYS_AAA            # 1919-01-01->2026-06-01
    # -- macro profundo mensual (ciclo real; ffill causal) --
    - INDPRO               # 1919-01-01->2026-06-01; produccion industrial YoY
    - PPI_ALL_COMMODITIES  # 1913-01-01->2026-06-01; inflacion/deflacion de materias primas YoY
  features_causales_derivadas:
    - SP500_vol_z          # AUC 0.739; +2.74 covid / +2.50 black_monday, pero NEGATIVO en bear lentos
    - SP500_momentum       # AUC 0.724; cubre el bear lento que la vol NO ve (1957/1966/1969)
    - SP500_ret_z          # endogeno al label; debil (0.565) — solo contexto
    - SP500_drawdown       # endogeno; debil (0.598) — confunde 'en crisis' con 'recuperandose'
    - credit_BaaAaa_z      # (MOODYS_BAA - MOODYS_AAA) mensual, ffill causal; unico credito vivo en 1929
    - INDPRO_yoy_z
    - PPI_yoy_z
  justificacion: >
    cobertura_calidad §8.2 recomienda esta ventana como el bloque diario de maxima potencia:
    equity + vol realizada + factores FF => 22/22 crisis. crisis_espina_profunda cuantifica el
    salto de potencia: la espina 1927 ve 22 crisis (10 recesiones NBER) frente a 10 (2 NBER) del
    panel B de 2007 — ir profundo son 2.2x eventos. El coste es un set de features pobre pre-1990:
    en 1929/1937 solo hay 14-15/76 series vivas, asi que las crisis profundas SOLO se caracterizan
    con equity(ret+vol) + spread Baa-Aaa mensual (1919) + macro mensual (INDPRO 1919 / PPI 1913).
    El fin 2026-05-29 lo impone el lag academico de Fama-French; si se prescinde de FF y el retorno
    de mercado se deriva de SP500, el panel se extiende a 2026-07-17 (documentado, no usado por
    defecto para mantener el spine factorial 1926).

# ===========================================================================
# PISTA B — panel rico multi-activo. Objetivo: RIQUEZA (separar; atacar 2013).
# ===========================================================================
pista_B:
  descripcion: "credito/curva/vol/breakevens/sectores/FX densos; muchas features, ~2003+, pocas crisis"
  objetivo: riqueza
  ventana_inicio: '2003-01-02'   # gobiernan los breakevens TIPS DFII10 / T10YIE / DFII5
  ventana_fin: '2026-07-10'      # gobierna MOVE (yfinance)
  gobierna_inicio: [DFII10, T10YIE, DFII5]
  gobierna_fin: MOVE
  granularidad: diaria
  n_crisis_en_ventana: 10        # picos >= 2003-01-02 (pierde dotcom, cuyo pico es 2000-03-24)
  series_features:
    # -- discriminadores primarios de NIVEL (top del ranking causal) --
    - VIX                  # 1990-01-02; VIX_level_z AUC 0.810
    - MOVE                 # 2002-11-12; MOVE_level_z AUC 0.800, mayor Cohen's d (+1.33)
    - BAA10Y               # 1986-01-02; credit_BAA10Y_z AUC 0.792
    - MOODYS_BAA_AAA_SPREAD # 1986-01-02; credit_BaaAaa_z AUC 0.745
    # -- VELOCIDAD de tipos: ataca el punto ciego 2013 (taper) --
    - DFII10               # 2003-01-02; real 10Y, DFII10_change_z z=3.83 en el taper
    - DGS10                # 1962-01-02; DGS10_change_z z=3.11 en el taper
    # -- curva / breakevens (nivel de pendiente = contexto; real vs breakeven) --
    - DGS2                 # 1976-06-01
    - T10Y2Y               # 1976-06-01; empino 1.46->2.52 en 2013 (bear steepening)
    - T10Y3M               # 1982-01-04
    - T10YIE               # 2003-01-02; breakeven inflacion 10Y
    - DFII5                # 2003-01-02
    # -- tipificacion de regimen (corr accion-bono, cambia de signo ~2000) --
    - SP500                # referencia equity (compartida con Pista A) para corr_spx_bond
    # -- dispersion sectorial (9 SPDR, densos desde 1998-12-22) --
    - SPDR_XLB
    - SPDR_XLE
    - SPDR_XLF
    - SPDR_XLI
    - SPDR_XLK
    - SPDR_XLP
    - SPDR_XLU
    - SPDR_XLV
    - SPDR_XLY
    # -- FX refugio / commodities procíclicas (confirmadores de risk-off) --
    - DXY                  # 1971-01-04; dolar = eje risk-off
    - DEXJPUS              # 1971-01-04; yen refugio
    - SPGSCI               # 1984-01-03; commodities procíclicas
  features_causales_derivadas:
    - VIX_level_z
    - MOVE_level_z
    - credit_BAA10Y_z
    - credit_BaaAaa_z
    - DFII10_change_z      # velocidad tipo real; z=3.83 en taper 2013
    - MOVE_change_z        # aceleracion vol de tipos; z=3.34 en taper 2013
    - DGS10_change_z       # velocidad nominal; z=3.11 en taper 2013
    - corr_spx_bond        # tipificadora: +0.3/+0.5 crisis inflacion (pre-2000) / -0.5/-0.6 crecimiento (post-2000)
    - yield_slope_z        # AMBIGUA (nivel): engaña en 2013 (muy positiva, empinandose)
    - sector_dispersion    # de los 9 SPDR
  ventana_alt_volofvol:    # sub-banco opcional que AÑADE vol-of-vol / term-structure sin perder GFC
    ventana_inicio: '2007-05-10'  # gobierna OVX
    ventana_fin: '2026-07-10'
    gobierna_inicio: OVX
    n_crisis_en_ventana: 10       # pico GFC 2007-10-09 >= 2007-05-10 => se conservan las 10
    series_extra: [OVX, VVIX, VIX3M, RVX]
    nota: >
      Mantiene el pico de la GFC. NO exigir GVZ (2008-06-03) ni VIX6M (2008-01-02) como ancla:
      empujan el inicio a 2008-06 y sacrifican la GFC (cobertura_calidad §3).
  justificacion: >
    cobertura_calidad §8.3 fija el panel core denso en 2003-01-02 (breakevens TIPS) -> 2026-07-10
    (MOVE): sectores + credito + curva + breakevens + MOVE + VIX = 10 crisis, panel totalmente
    poblado en 2013 (91/96 series de B con dato el 2013-07-01). candidatas_features muestra que en
    esta era ganan los NIVELES exogenos al label (VIX/MOVE/credito, AUC 0.75-0.81), con mucho filo
    pero poca potencia (cada uno ve 10-14 crisis). El valor añadido de B es atacar 2013: no como
    crisis a detectar (no lo es) sino con features de VELOCIDAD de tipos (DFII10/MOVE/DGS10 change,
    z=3.1-3.8) que credito_curva_2013 identifica como lo unico que dispara ese shock puro de tipos.

