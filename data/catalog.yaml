# catalog.yaml — universo de datos declarado (FUENTE DE VERDAD de la capa de datos v2)
#
# ESTADO: POBLADO (FASE 2). Informe de fuentes en docs/SOTA_datos.md (12 categorias),
# verificadas de verdad el 2026-07-18 (FRED API con FRED_API_KEY, yfinance period='max',
# CSV de OFR y repos GitHub datahub/PDDL). Cada serie declara: nombre interno, fuente,
# ticker/id, fallback, histórico verificado, granularidad, rol y a qué pista pertenece.
#
# Las dos pistas (decisión ADR-001; definiciones canónicas en docs/GLOSARIO.md):
#   A = espina histórica profunda: banco desde 1927 (S&P500 diario ^GSPC lo gobierna;
#       crédito/macro mensual desde 1913-1919). Pocas features, 22 crisis -> potencia.
#   B = panel rico multi-activo: banco desde 2003 (breakevens TIPS; sub-banco vol-of-vol 2007).
#       Crédito/curva/vol/FX/macro, muchas features, 10 crisis -> riqueza, ataca 2013.
#
# Convención de placement: cada serie aparece UNA sola vez (deduplicada). Las series
# marcadas pista: ambas se usan en las DOS pistas; se listan físicamente bajo pista_A
# (su hogar histórico profundo) y el campo `pista: ambas` señala el doble uso en el panel B.
# `rol`: spine | core | enricher | fallback | validation (definiciones en docs/GLOSARIO.md).
#   spine=columna vertebral | core=feature principal | enricher=enriquecedor opcional |
#   fallback=sustituto redundante | validation=ground truth, NUNCA feature (anti-fuga).
# `fallback`: fuente/ticker redundante verificado para la misma serie.
# Series verificado: false se marcan `estado: candidata` (no verificadas o fuente bloqueada/retirada).

meta:
  version: 1
  estado: poblado_fase2
  actualizado: 2026-07-18
  politica:
    imputacion: "NUNCA — cada serie arranca en su fecha real; huecos quedan NaN"
    causalidad: "toda feature derivada será z-score expanding/rolling; se verifica con assert_causal"
    reproducibilidad: "raw con checksum + provenance; descargas versionadas; verificado end-to-end 2026-07-18"
    dedup: "una serie que aparece en varias categorias va una vez, con la mejor fuente como primaria y la otra como `fallback`"
    validacion: "los índices de estrés/recesión son ground-truth (rol=validation); NUNCA usarlos a la vez como feature y como label (fuga)"
  resumen:
    # Recuento REAL (reconciliado con data/raw/coverage_report.csv):
    total_series_declaradas: 174        # bloques: pista_A 79 + pista_B 70 + validacion_externa 25
    descargadas_ok: 166
    no_descargables_declaradas: 8       # stooq bloqueado, listas no-serie, JST/Philly URL, etc.
    por_campo_pista: { A: 44, ambas: 35, B: 70, validacion: 25 }   # 'ambas' viven bajo pista_A
    por_rol: { spine: 23, core: 44, enricher: 62, fallback: 24, validation: 21 }
  notas_globales:
    - "Stooq BLOQUEADO en este entorno (challenge JS / proof-of-work): todos los fallbacks stooq quedan como candidatas."
    - "ICE Data Indices rompió dos históricos en FRED: OAS BofA (BAML*) capadas a ventana rodante de 3 años (desde abril-2026) y el fixing diario del oro LBMA (GOLDPMGBD228NLBM) retirado. Sustitutos verificados: spread Moody's Baa-Aaa y HYG/IEF (crédito); GC=F/GLD (oro)."
    - "LIBOR diario retirado de FRED (fin de LIBOR): TED clásico descontinuado 2022; sucesores vivos = PAPER_BILL_SPREAD, CP_FFR_SPREAD, SOFR_EFFR_SPREAD."
    - "ISM/PMI no está gratis en FRED: proxy = encuestas Fed regionales (Philly 1968+, Empire, Dallas)."
    - "Punto ciego 2013 (taper tantrum) cubierto: curva FRED y FX diarios densos (250 obs/2013), útiles como ancla para rellenar otros paneles."

fuentes:  # disponibilidad verificada 2026-07-18 (no marketing)
  fred:      { tipo: api,     auth: FRED_API_KEY, base: "https://api.stlouisfed.org/fred", estado: ok }
  yfinance:  { tipo: lib,     auth: none,         estado: ok }
  ofr:       { tipo: csv,     auth: none,         base: "https://www.financialresearch.gov/financial-stress-index/data/fsi.csv", notas: "requiere User-Agent de navegador; NO está en FRED (OFRFSI->400)" }
  github:    { tipo: repo,    auth: none,         notas: "datahub.io (licencia ODC-PDDL-1.0) + fja05680/sp500; raw.githubusercontent.com" }
  academico: { tipo: csv,     auth: none,         notas: "Shiller (Yale), Ken French (Dartmouth), Goyal-Welch (Google Sheet), Jordà-Schularick-Taylor macrohistory.net" }
  stooq:     { tipo: csv,     auth: none,         estado: bloqueado, notas: "challenge JS / PoW SHA-256; no scriptable sin navegador (2026-07-18)" }
  kaggle:    { tipo: dataset, auth: opcional,     notas: "SPA sin metadatos a máquina; descarga requiere kaggle.json; casi todo re-export congelado de ^GSPC/SPY" }

# ===========================================================================
# PISTA A — Espina histórica profunda (incluye series pista:ambas de doble uso)
# ===========================================================================
pista_A:
  descripcion: "S&P500 + factores + volatilidad + spines profundos de curva/crédito/FX/commodities/macro, máxima historia, para maximizar nº de crisis"
  ventana_objetivo: "banco desde 1927 (S&P500 diario); datos profundos hasta 1854/1871"
  series:

  # ---- Equity / factores / valoración (espina diaria y mensual profunda) ----
  - nombre_interno: SP500
    descripcion: "S&P 500 índice de precio, la espina diaria más profunda gratis."
    fuente: yfinance
    id: "^GSPC"
    auth: none
    inicio_verificado: "1927-12-30"
    granularidad: diaria
    pista: A
    rol: spine
    relevancia_regimen: "Nivel/retorno del mercado US; base de drawdowns, vol realizada y estados bull/bear. También fuente para derivar CRISIS_WINDOWS."
    verificado: true
    url: "https://finance.yahoo.com/quote/%5EGSPC"

  - nombre_interno: SP500_TR
    descripcion: "S&P 500 Total Return (dividendos reinvertidos)."
    fuente: yfinance
    id: "^SP500TR"
    auth: none
    inicio_verificado: "1988-01-04"
    granularidad: diaria
    pista: A
    rol: core
    relevancia_regimen: "Retorno total real del inversor; mejor que precio para regímenes de rendimiento."
    verificado: true
    url: "https://finance.yahoo.com/quote/%5ESP500TR"

  - nombre_interno: SHILLER_SP500_CAPE
    descripcion: "S&P500 mensual + CAPE (PE10) + Dividend/Earnings/CPI/Long-rate desde 1871. Mirror GitHub datahub (vivo) de la serie de Shiller."
    fuente: github
    fallback: "academico:ie_data.xls (Yale, canónico, ÚNICO con TR CAPE, pero va con retraso ~2023-09)"
    id: "datasets/s-and-p-500:data/data.csv"
    auth: none
    inicio_verificado: "1871-01-01"
    granularidad: mensual
    pista: A
    rol: spine
    relevancia_regimen: "Ancla secular 150+ años; CAPE = régimen de valoración caro/barato y ciclos largos. CSV plano vivo hasta 2026-06 (ODC-PDDL-1.0)."
    verificado: true
    url: "https://github.com/datasets/s-and-p-500"

  - nombre_interno: FF_FACTORS_3_DAILY
    descripcion: "Fama-French 3 factores DIARIOS (Mkt-RF, SMB, HML) + RF, mercado US (CRSP value-weighted)."
    fuente: academico
    id: "F-F_Research_Data_Factors_daily"
    auth: none
    inicio_verificado: "1926-07-01"
    granularidad: diaria
    pista: A
    rol: spine
    relevancia_regimen: "Espina diaria de máxima profundidad (1926): exceso de retorno del mercado + factores size (SMB) y value (HML); drawdowns/vol de todas las crisis. Compuesto Mkt-RF+RF = índice TR diario más limpio que ^GSPC."
    verificado: true
    url: "https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html"

  - nombre_interno: FF_FACTORS_3_MONTHLY
    descripcion: "Fama-French 3 factores MENSUALES (Mkt-RF, SMB, HML) + RF."
    fuente: academico
    id: "F-F_Research_Data_Factors"
    auth: none
    inicio_verificado: "1926-07"
    granularidad: mensual
    pista: A
    rol: fallback
    relevancia_regimen: "Remuestreo/fallback mensual del spine factorial; alinea con Shiller/Goyal-Welch."
    verificado: true
    url: "https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html"

  - nombre_interno: FF_MOM_DAILY
    descripcion: "Fama-French momentum factor (WML/UMD) DIARIO, mercado US."
    fuente: academico
    id: "F-F_Momentum_Factor_daily"
    auth: none
    inicio_verificado: "1926-11-03"
    granularidad: diaria
    pista: A
    rol: enricher
    relevancia_regimen: "Momentum crashes (UMD muy negativo) = marcadores clásicos de giro de régimen (2009-03, 2020-03)."
    verificado: true
    url: "https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html"

  - nombre_interno: FF_FACTORS_5_DAILY
    descripcion: "Fama-French 5 factores DIARIOS (Mkt-RF, SMB, HML, RMW, CMA) + RF."
    fuente: academico
    id: "F-F_Research_Data_5_Factors_2x3_daily"
    auth: none
    inicio_verificado: "1963-07-01"
    granularidad: diaria
    pista: A
    rol: enricher
    relevancia_regimen: "Rotación de estilos (quality RMW, investment CMA) informa flight-to-quality; menos profundo (1963)."
    verificado: true
    url: "https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html"

  - nombre_interno: FF_5_INDUSTRY
    descripcion: "Ken French 5 Industry Portfolios diarios (Cnsmr,Manuf,HiTec,Hlth,Other) desde 1926."
    fuente: academico
    id: "5_Industry_Portfolios_daily"
    auth: none
    inicio_verificado: "1926-07-01"
    granularidad: diaria
    pista: A
    rol: enricher
    relevancia_regimen: "Rotación sectorial con 100 años; sectores en crisis pre-1998 donde no hay SPDR. También versiones 10/12/49 industrias."
    verificado: true
    url: "https://mba.tuck.dartmouth.edu/pages/faculty/ken.french/data_library.html"

  # ---- Volatilidad (espina profunda; VIX/SKEW dual-uso) ----
  - nombre_interno: REALIZED_VOL_SP500
    descripcion: "Volatilidad realizada del S&P500 (rolling std de log-returns anualizada), calculada de ^GSPC."
    fuente: yfinance
    id: "^GSPC"
    auth: none
    inicio_verificado: "1928-01-31"
    granularidad: diaria
    pista: A
    rol: spine
    relevancia_regimen: "Única vol disponible pre-1986; captura ~10+ crisis (1929,1937,1987,2000,2008...). Base del variance risk premium vs VIX."
    verificado: true
    url: "https://finance.yahoo.com/quote/%5EGSPC"

  - nombre_interno: VXO
    descripcion: "CBOE S&P100 Volatility Index (metodología VIX vieja). Implícita más antigua; extiende el VIX pre-1990."
    fuente: fred
    fallback: "yfinance:^VXO"
    id: "VXOCLS"
    auth: FRED_API_KEY
    inicio_verificado: "1986-01-02"
    granularidad: diaria
    pista: A
    rol: core
    relevancia_regimen: "Cubre el crash de 1987 (Black Monday) que el VIX no alcanza; empalme casi limpio con VIX (media VXO-VIX=+0.27). DESCONTINUADO 2021-09-23."
    verificado: true
    url: "https://fred.stlouisfed.org/series/VXOCLS"

  - nombre_interno: VIX
    descripcion: "CBOE Volatility Index (implícita S&P500 30d). Termómetro de miedo, feature de vol núcleo."
    fuente: fred
    fallback: "yfinance:^VIX; github:datasets/finance-vix (OHLC, PDDL)"
    id: "VIXCLS"
    auth: FRED_API_KEY
    inicio_verificado: "1990-01-02"
    granularidad: diaria
    pista: ambas
    rol: core
    relevancia_regimen: "Discriminador primario risk-on/risk-off; niveles y saltos definen crisis. También sirve de validación laxa (VIX>20 estrés, >30 crisis) — no usar a la vez como feature y label."
    verificado: true
    url: "https://fred.stlouisfed.org/series/VIXCLS"

  - nombre_interno: SKEW
    descripcion: "CBOE SKEW Index: precio del riesgo de cola izquierda (tail risk) del S&P500."
    fuente: yfinance
    id: "^SKEW"
    auth: none
    inicio_verificado: "1990-01-02"
    granularidad: diaria
    pista: ambas
    rol: enricher
    relevancia_regimen: "Complementa al VIX: mide asimetría/miedo a crash incluso con vol baja; historia larga (1990)."
    verificado: true
    url: "https://finance.yahoo.com/quote/%5ESKEW"

  # ---- Índices amplios profundos ----
  - nombre_interno: NASDAQ_COMP
    descripcion: "Nasdaq Composite."
    fuente: yfinance
    fallback: "fred:NASDAQCOM"
    id: "^IXIC"
    auth: none
    inicio_verificado: "1971-02-05"
