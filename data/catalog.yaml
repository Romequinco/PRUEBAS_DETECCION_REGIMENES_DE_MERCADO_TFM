      verificado: true
      evidencia: FRED ANFCI -> 2897 obs, first 1971-01-08=0.587, last 2026-07-10=-0.535 (upd 2026-07-15).
      url: https://fred.stlouisfed.org/series/ANFCI
    - nombre_interno: NFCI_RISK
